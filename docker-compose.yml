services:
  postgres:
    image: postgres:16
    container_name: ros-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: restaurant_os
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ros-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  ai-service:
    build: ./ai-service
    container_name: ros-ai-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_started

  backend:
    build: ./backend
    container_name: ros-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    env_file: .env

volumes:
  pgdata:
