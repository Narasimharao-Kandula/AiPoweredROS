services:
  postgres:
    image: postgres:16
    container_name: ros-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: restaurant_os
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ros-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
